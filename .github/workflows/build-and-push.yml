name: Build and Push Container Images

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'uftp-receiver/**'
      - 'web-viewer/**'
      - '.github/workflows/build-and-push.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: uftp-fpv-client
            context: ./client
          - name: uftp-fpv-receiver
            context: ./uftp-receiver
          - name: uftp-fpv-web
            context: ./web-viewer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=UFTP FPV camera system — ${{ matrix.name }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Make all three packages public after the build jobs complete.
  # Requires the default GITHUB_TOKEN — no extra secret needed.
  publish-public:
    name: Set packages public
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Make packages public via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in uftp-fpv-client uftp-fpv-receiver uftp-fpv-web; do
            echo "Setting $pkg to public..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              /user/packages/container/${pkg} \
              -f visibility=public \
            && echo "$pkg -> public" || echo "Warning: could not set $pkg public (may already be public or require org admin)"
          done
